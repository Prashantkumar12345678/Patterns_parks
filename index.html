<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patterns Park</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="viewport">
      <section class="stage is-intro" aria-label="Complete the pattern lamp game">
        <div class="stage-shade" aria-hidden="true"></div>

        <header class="instruction-banner">
          <img src="assets/ui/answer-panel.png" alt="" aria-hidden="true" />
          <h1 id="instructionText">Complete the pattern.</h1>
        </header>

        <section class="lamp-line" aria-label="Lamp post pattern">
          <img
            id="patternLampOne"
            class="lamp pattern-lamp slot-one"
            src="assets/lamps/lamp-7-on.png"
            alt="Lamp post with seven lights"
          />
          <img
            id="patternLampTwo"
            class="lamp pattern-lamp slot-two"
            src="assets/lamps/lamp-6-on.png"
            alt="Lamp post with six lights"
          />
          <img
            id="patternLampThree"
            class="lamp pattern-lamp slot-three"
            src="assets/lamps/lamp-5-on.png"
            alt="Lamp post with five lights"
          />
          <img
            id="buildLamp"
            class="lamp lamp-empty"
            src="assets/lamps/pole-0-off.png"
            alt="Empty lamp post"
          />
          <img
            id="introBlankLamp"
            class="lamp intro-blank"
            src="assets/lamps/pole-0-off.png"
            alt="Empty lamp post"
          />
        </section>

        <section class="hint-counts" aria-label="Lamp count hint" aria-hidden="true">
          <span class="hint-count hint-count-one">7</span>
          <span class="hint-count hint-count-two">6</span>
          <span class="hint-count hint-count-three">5</span>
          <span class="hint-count hint-count-four">4</span>
          <span class="hint-count hint-count-five">3</span>
        </section>

        <button id="hintButton" class="hint-control" type="button" aria-label="Show hint">Hint</button>

        <button id="addBulbButton" class="plus-control" type="button" aria-label="Add bulb">
          <img src="assets/ui/plus.png" alt="" aria-hidden="true" />
        </button>

        <button id="checkButton" class="check-control" type="button" aria-label="Check answer" disabled>
          <img src="assets/ui/check-normal.png" alt="" aria-hidden="true" />
        </button>
      </section>
    </main>
    <script src="main.js" defer></script>
  </body>
</html>
