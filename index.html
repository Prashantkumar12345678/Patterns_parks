<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patterns Park</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="viewport">
      <section class="stage" aria-label="Tap to add the bulbs game screen">
        <div class="stage-shade" aria-hidden="true"></div>

        <header class="instruction-banner">
          <img src="assets/ui/answer-panel.png" alt="" aria-hidden="true" />
          <h1 id="instructionText">Tap to add the bulbs</h1>
        </header>

        <section class="lamp-line" aria-label="Lamp post pattern">
          <img
            class="lamp lamp-7"
            src="assets/lamps/lamp-7-on.png"
            alt="Lamp post with seven lights"
          />
          <img
            class="lamp lamp-6"
            src="assets/lamps/lamp-6-on.png"
            alt="Lamp post with six lights"
          />
          <img
            class="lamp lamp-5"
            src="assets/lamps/lamp-5-on.png"
            alt="Lamp post with five lights"
          />
          <img
            id="buildLamp"
            class="lamp lamp-empty"
            src="assets/lamps/pole-0-off.png"
            alt="Empty lamp post"
          />
        </section>

        <button id="addBulbButton" class="plus-control" type="button" aria-label="Add bulb">
          <img src="assets/ui/plus.png" alt="" aria-hidden="true" />
        </button>

        <button id="checkButton" class="check-control" type="button" aria-label="Check answer" disabled>
          <img src="assets/ui/check-normal.png" alt="" aria-hidden="true" />
        </button>
      </section>
    </main>
    <script src="main.js" defer></script>
  </body>
</html>
